services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-destiny_recommender_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-destiny_recommender_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      bash -lc "mix setup && mix phx.server"
    environment:
      MIX_ENV: dev
      PHX_SERVER: true
      PHX_HOST_IP: 0.0.0.0
      PORT: 4000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-destiny_recommender_dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      BUNGIE_API_KEY: ${BUNGIE_API_KEY:-}
      BUNGIE_MANIFEST_LOCALE: ${BUNGIE_MANIFEST_LOCALE:-en}
      BUNGIE_PLATFORM_URL: ${BUNGIE_PLATFORM_URL:-https://www.bungie.net/Platform}
      BUNGIE_CONTENT_URL: ${BUNGIE_CONTENT_URL:-https://www.bungie.net}
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - deps_cache:/app/deps
      - build_cache:/app/_build
      - mix_cache:/root/.mix
      - hex_cache:/root/.hex
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  deps_cache:
  build_cache:
  mix_cache:
  hex_cache:
